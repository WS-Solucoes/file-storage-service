version: "3.9"

networks:
  ws_network:
    driver: bridge
  rede_deploy: # <-- MUDANÇA: Declaramos a rede externa
    external: true

# volumes:
#   postgres_data:

services:
  

  service-discovery:
    build:
      context: .
      dockerfile: service-discovery/Dockerfile
    container_name: service-discovery
    restart: unless-stopped
    networks:
      - ws_network
    ports:
      - "9876:9876"
    environment:
      DISCOVERY_SERVER_PORT: 9876
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
    

  common:
    build:
      context: .
      dockerfile: common/Dockerfile
    container_name: common
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9081:9081"
    environment:
      COMMON_SERVER_PORT: 9081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_HIKARI_JDBC_URL: jdbc:postgresql://postgres:5432/frotas
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      COMMON_ALLOWED_ORIGINS: http://srv752535.hstgr.cloud:9300,http://localhost:9300,https://srv752535.hstgr.cloud
      SPRING_CLOUD_CLIENT_HOSTNAME: common
      EUREKA_INSTANCE_HOSTNAME: common
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      - service-discovery
      

  efrotas-api:
    build:
      context: .
      dockerfile: eFrotas/Dockerfile
    container_name: efrotas-api-v2
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9082:9082"
    environment:
      EFROTAS_SERVER_PORT: 9082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_HIKARI_JDBC_URL: jdbc:postgresql://postgres:5432/frotas
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      EFROTAS_ALLOWED_ORIGINS: http://srv752535.hstgr.cloud:9300,http://localhost:9300,https://srv752535.hstgr.cloud
      SPRING_CLOUD_CLIENT_HOSTNAME: efrotas-api-v2
      EUREKA_INSTANCE_HOSTNAME: efrotas-api-v2
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      - common

  erh-api:
    build:
      context: .
      dockerfile: eRH-Service/Dockerfile
    container_name: erh-api
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9083:9083"
    environment:
      ERH_SERVER_PORT: 9083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_ERH_URL: jdbc:postgresql://postgres:5432/erh
      SPRING_DATASOURCE_ERH_USERNAME: postgres
      SPRING_DATASOURCE_ERH_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_HIKARI_JDBC_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_ERH_HIKARI_JDBC_URL: jdbc:postgresql://postgres:5432/erh
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      ERH_ALLOWED_ORIGINS: http://srv752535.hstgr.cloud:9300,http://localhost:9300,https://srv752535.hstgr.cloud
      SPRING_CLOUD_CLIENT_HOSTNAME: erh-api
      EUREKA_INSTANCE_HOSTNAME: erh-api
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      - common

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    networks:
      - ws_network
    ports:
      - "9080:9080"
    environment:
      API_GATEWAY_PORT: 9080
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      WS_GATEWAY_ALLOWED_ORIGINS: http://localhost:9300,http://localhost:3000,http://srv752535.hstgr.cloud:9300
      SPRING_CLOUD_CLIENT_HOSTNAME: api-gateway
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    depends_on:
      - efrotas-api
      - erh-api
      - common

  frontend:
    build:
      context: ./frontend-services
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    networks:
      - ws_network
    ports:
      - "9300:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_GATEWAY_URL: http://srv752535.hstgr.cloud:9080
      NEXT_PUBLIC_FROTAS_PREFIX: /frotas
      NEXT_PUBLIC_ERH_PREFIX: /erh
      NEXT_PUBLIC_API_PREFIX: /api/v1
      NEXT_PUBLIC_AUTH_PREFIX: /api/auth
     
    depends_on:
      - api-gateway