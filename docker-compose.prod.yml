version: "3.9"

networks:
  ws_network:
    driver: bridge
  rede_deploy:
    external: true

services:
  service-discovery:
    build:
      context: .
      dockerfile: service-discovery/Dockerfile
    container_name: service-discovery
    restart: unless-stopped
    networks:
      - ws_network
    ports:
      - "9876:9876" # Eureka: http://srv752535.hstgr.cloud:9876
    environment:
      DISCOVERY_SERVER_PORT: 9876
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka

  common:
    build:
      context: .
      dockerfile: common/Dockerfile
    container_name: common
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9081:9081"
    environment:
      COMMON_SERVER_PORT: 9081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      COMMON_ALLOWED_ORIGINS: "https://wsolucoes.com,http://srv752535.hstgr.cloud:9080,http://srv752535.hstgr.cloud:3000"
      SPRING_CLOUD_CLIENT_HOSTNAME: common
      EUREKA_INSTANCE_HOSTNAME: common

  efrotas-api:
    build:
      context: .
      dockerfile: eFrotas/Dockerfile
    container_name: efrotas-api-v2
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9082:9082"
    environment:
      EFROTAS_SERVER_PORT: 9082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      EFROTAS_ALLOWED_ORIGINS: "https://wsolucoes.com,http://srv752535.hstgr.cloud:9080,http://srv752535.hstgr.cloud:3000"
      SPRING_CLOUD_CLIENT_HOSTNAME: efrotas-api-v2
      EUREKA_INSTANCE_HOSTNAME: efrotas-api-v2

  erh-api:
    build:
      context: .
      dockerfile: eRH-Service/Dockerfile
    container_name: erh-api
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9083:9083"
    environment:
      - ERH_SERVER_PORT=9083
      - EUREKA_SERVER_URL=http://service-discovery:9876/eureka
      - ERH_ALLOWED_ORIGINS=https://wsolucoes.com,http://srv752535.hstgr.cloud:9080,http://srv752535.hstgr.cloud:3000
      - SPRING_CLOUD_CLIENT_HOSTNAME=erh-api
      - EUREKA_INSTANCE_HOSTNAME=erh-api
      - 'JAVA_OPTS=-Dspring.datasource.url=jdbc:postgresql://postgres:5432/frotas -Dspring.datasource.username=postgres -Dspring.datasource.password=oCV36=?CT97 -Dspring.datasource.erh.url=jdbc:postgresql://postgres:5432/erh -Dspring.datasource.erh.username=postgres -Dspring.datasource.erh.password=oCV36=?CT97'

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    ports:
      - "9080:9080" # Gateway no IP: http://srv752535.hstgr.cloud:9080
    environment:
      API_GATEWAY_PORT: 9080
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      WS_GATEWAY_ALLOWED_ORIGINS: "https://wsolucoes.com,http://srv752535.hstgr.cloud:9080,http://srv752535.hstgr.cloud:3000"
      SPRING_CLOUD_CLIENT_HOSTNAME: api-gateway
      EUREKA_INSTANCE_HOSTNAME: api-gateway
    labels:
      - "traefik.enable=false" # Desativado no domínio para evitar conflito com 404

  frontend:
    build:
      context: ./frontend-services
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GATEWAY_URL=http://srv752535.hstgr.cloud:9080
        - NEXT_PUBLIC_FROTAS_PREFIX=/frotas
        - NEXT_PUBLIC_ERH_PREFIX=/erh
        - NEXT_PUBLIC_API_PREFIX=/api/v1
        - NEXT_PUBLIC_AUTH_PREFIX=/api/auth
    container_name: frontend
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GATEWAY_URL=http://srv752535.hstgr.cloud:9080
      - NEXT_PUBLIC_FROTAS_PREFIX=/frotas
      - NEXT_PUBLIC_ERH_PREFIX=/erh
      - NEXT_PUBLIC_API_PREFIX=/api/v1
      - NEXT_PUBLIC_AUTH_PREFIX=/api/auth
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws-frontend.rule=Host(`wsolucoes.com`) || Host(`www.wsolucoes.com`)"
      - "traefik.http.routers.ws-frontend.entrypoints=websecure"
      - "traefik.http.routers.ws-frontend.tls=true"
      - "traefik.http.routers.ws-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ws-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.ws-frontend.priority=1"