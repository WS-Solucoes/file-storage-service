version: "3.9"

networks:
  ws_network:
    driver: bridge
  rede_deploy:
    external: true

services:
  service-discovery:
    build:
      context: .
      dockerfile: service-discovery/Dockerfile
    container_name: service-discovery
    restart: unless-stopped
    networks:
      - ws_network
    environment:
      DISCOVERY_SERVER_PORT: 9876
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka

  common:
    build:
      context: .
      dockerfile: common/Dockerfile
    container_name: common
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    environment:
      COMMON_SERVER_PORT: 9081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: oCV36=?CT97
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      COMMON_ALLOWED_ORIGINS: "https://wsolucoes.com"
      SPRING_CLOUD_CLIENT_HOSTNAME: common
      EUREKA_INSTANCE_HOSTNAME: common

  efrotas-api:
    build:
      context: .
      dockerfile: eFrotas/Dockerfile
    container_name: efrotas-api-v2
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    environment:
      EFROTAS_SERVER_PORT: 9082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/frotas
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: oCV36=?CT97
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      EFROTAS_ALLOWED_ORIGINS: "https://wsolucoes.com"
      SPRING_CLOUD_CLIENT_HOSTNAME: efrotas-api-v2
      EUREKA_INSTANCE_HOSTNAME: efrotas-api-v2

  erh-api:
    build:
      context: .
      dockerfile: eRH-Service/Dockerfile
    container_name: erh-api
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    environment:
      - ERH_SERVER_PORT=9083
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=oCV36=?CT97
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/frotas
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=oCV36=?CT97
      - SPRING_DATASOURCE_ERH_URL=jdbc:postgresql://postgres:5432/erh
      - EUREKA_SERVER_URL=http://service-discovery:9876/eureka
      - ERH_ALLOWED_ORIGINS=https://wsolucoes.com
      - SPRING_CLOUD_CLIENT_HOSTNAME=erh-api
      - EUREKA_INSTANCE_HOSTNAME=erh-api
      - 'JAVA_OPTS=-Dspring.datasource.url=jdbc:postgresql://postgres:5432/frotas -Dspring.datasource.username=postgres -Dspring.datasource.password=oCV36=?CT97 -Dspring.datasource.erh.url=jdbc:postgresql://postgres:5432/erh -Dspring.datasource.erh.username=postgres -Dspring.datasource.erh.password=oCV36=?CT97'

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    environment:
      API_GATEWAY_PORT: 9080
      EUREKA_SERVER_URL: http://service-discovery:9876/eureka
      WS_GATEWAY_ALLOWED_ORIGINS: "https://wsolucoes.com"
      SPRING_CLOUD_CLIENT_HOSTNAME: api-gateway
      EUREKA_INSTANCE_HOSTNAME: api-gateway
    labels:
      - "traefik.enable=true"
      # SOLUÇÃO 1: Especifique a rede para o Traefik não se perder
      - "traefik.docker.network=rede_deploy"
      
      # SOLUÇÃO 2: Sintaxe mais robusta para múltiplos prefixos
      - "traefik.http.routers.ws-gateway.rule=Host(`wsolucoes.com`) && (PathPrefix(`/api`) || PathPrefix(`/frotas`) || PathPrefix(`/erh`) || PathPrefix(`/common`))"
      
      - "traefik.http.routers.ws-gateway.entrypoints=websecure"
      - "traefik.http.routers.ws-gateway.tls=true"
      - "traefik.http.routers.ws-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.ws-gateway.loadbalancer.server.port=9080"
      - "traefik.http.routers.ws-gateway.priority=100"

  frontend:
    build:
      context: ./frontend-services
      dockerfile: Dockerfile
      args:
        # Frontend agora chama o domínio em HTTPS (Resolve o Mixed Content)
        - NEXT_PUBLIC_GATEWAY_URL=https://wsolucoes.com
        - NEXT_PUBLIC_FROTAS_PREFIX=/frotas
        - NEXT_PUBLIC_ERH_PREFIX=/erh
        - NEXT_PUBLIC_API_PREFIX=/api/v1
        - NEXT_PUBLIC_AUTH_PREFIX=/api/auth
    container_name: frontend
    restart: unless-stopped
    networks:
      - ws_network
      - rede_deploy
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GATEWAY_URL=https://wsolucoes.com
      - NEXT_PUBLIC_FROTAS_PREFIX=/frotas
      - NEXT_PUBLIC_ERH_PREFIX=/erh
      - NEXT_PUBLIC_API_PREFIX=/api/v1
      - NEXT_PUBLIC_AUTH_PREFIX=/api/auth
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws-frontend.rule=Host(`wsolucoes.com`) || Host(`www.wsolucoes.com`)"
      - "traefik.http.routers.ws-frontend.entrypoints=websecure"
      - "traefik.http.routers.ws-frontend.tls=true"
      - "traefik.http.routers.ws-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ws-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.ws-frontend.priority=1"