spring:
  application:
    name: file-storage-service

  # Upload de arquivos
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB
      file-size-threshold: 2KB

server:
  port: ${FILE_STORAGE_PORT:9085}

# ==================== Storage Configuration ====================
storage:
  type: ${STORAGE_TYPE:MINIO}   # LOCAL ou MINIO
  local:
    base-path: ${STORAGE_LOCAL_PATH:./storage-files}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:ws-documentos}
    region: ${MINIO_REGION:us-east-1}
    secure: ${MINIO_SECURE:false}

# ==================== Eureka ====================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}

# ==================== Swagger ====================
springdoc:
  api-docs:
    path: /api-doc/docs
  swagger-ui:
    path: /api-doc/swagger.html

# ==================== Management ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ==================== CORS ====================
cors:
  allowed-origins: "${STORAGE_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:9300}"

# ==================== Logging ====================
logging:
  level:
    ws.filestorage: INFO
    com.netflix.eureka: DEBUG
    com.netflix.discovery: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG
    io.minio: WARN
